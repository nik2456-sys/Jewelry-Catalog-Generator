openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Gemone Diamond Catalog Generator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Catalog generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /catalog/upload:
    post:
      operationId: uploadExcel
      tags: [catalog]
      summary: Upload Excel file and parse jewelry data
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Parsed jewelry data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedExcelData"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /catalog/generate:
    post:
      operationId: generateCatalog
      tags: [catalog]
      summary: Generate catalog PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCatalogRequest"
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    JewelryItem:
      type: object
      properties:
        srNo:
          type: integer
        title:
          type: string
        weight10k:
          type: number
        weight14k:
          type: number
        weight18k:
          type: number
        centerDiamondWeight:
          type: number
        sideDiamondWeight:
          type: number
        imageLeft:
          type: string
          description: CDN URL for left-angle product image
        imageCenter:
          type: string
          description: CDN URL for center/main product image
        imageRight:
          type: string
          description: CDN URL for right-angle product image
      required:
        - srNo
        - title
        - weight10k
        - weight14k
        - weight18k
        - centerDiamondWeight
        - sideDiamondWeight
    ParsedExcelData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/JewelryItem"
        totalRows:
          type: integer
      required: [items, totalRows]
    PricingConfig:
      type: object
      properties:
        goldPriceUSD:
          type: number
          description: Gold price per gram in USD
        diamondPriceUSD:
          type: number
          description: Diamond price per carat in USD
        labourPerGramUSD:
          type: number
          description: Labour charge per gram of metal in USD
        wastagePerGramUSD:
          type: number
          description: Wastage charge per gram of metal in USD (B2B only)
        handlingPercent:
          type: number
          description: Handling charge percentage
        profitPercent:
          type: number
          description: Profit margin percentage (B2C only)
        adminChargePercent:
          type: number
          description: Admin charge percentage (B2B only)
      required:
        - goldPriceUSD
        - diamondPriceUSD
        - labourPerGramUSD
        - wastagePerGramUSD
        - handlingPercent
        - profitPercent
        - adminChargePercent
    GenerateCatalogRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/JewelryItem"
        pricingConfig:
          $ref: "#/components/schemas/PricingConfig"
        catalogType:
          type: string
          enum: [B2B, B2C]
        showItemizedCharges:
          type: boolean
      required:
        - items
        - pricingConfig
        - catalogType
        - showItemizedCharges
