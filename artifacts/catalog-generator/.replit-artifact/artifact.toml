kind = "web"
previewPath = "/"
title = "Gemone Diamond Catalog Generator"
version = "1.0.0"
id = "artifacts/catalog-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/catalog-generator run dev"

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/catalog-generator", "run", "build"]
publicDir = "artifacts/catalog-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
